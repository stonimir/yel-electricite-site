<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Prise électrique">
  <title>Prise électrique</title>
  <g fill="none" stroke="#0D1B2A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cercle extérieur (contour prise) -->
    <circle cx="32" cy="32" r="22"/>
    <!-- Cercle intérieur (face avant) -->
    <circle cx="32" cy="32" r="14" stroke-width="2" opacity="0.4"/>
  </g>
  <!-- Deux trous contacts -->
  <g fill="#0D1B2A">
    <rect x="23" y="26" width="3.5" height="9" rx="1"/>
    <rect x="37.5" y="26" width="3.5" height="9" rx="1"/>
  </g>
  <!-- Broche de terre (jaune accent) -->
  <circle cx="32" cy="42" r="2.5" fill="#F5C518" stroke="#0D1B2A" stroke-width="1.5"/>
</svg>
