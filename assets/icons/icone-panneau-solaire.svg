<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Panneau solaire">
  <title>Panneau solaire</title>
  <!-- Soleil -->
  <g>
    <circle cx="50" cy="14" r="5" fill="#F5C518" stroke="#0D1B2A" stroke-width="1.5"/>
    <g stroke="#F5C518" stroke-width="2" stroke-linecap="round">
      <line x1="50" y1="4" x2="50" y2="6"/>
      <line x1="42" y1="14" x2="44" y2="14"/>
      <line x1="56" y1="14" x2="58" y2="14"/>
      <line x1="44.5" y1="8.5" x2="46" y2="10"/>
      <line x1="55.5" y1="8.5" x2="54" y2="10"/>
    </g>
  </g>
  <!-- Panneau (perspective isométrique simple) -->
  <g stroke="#0D1B2A" stroke-width="2.5" stroke-linejoin="round">
    <polygon points="8,52 20,24 56,24 44,52" fill="#0D1B2A" fill-opacity="0.1"/>
  </g>
  <!-- Grille de cellules -->
  <g stroke="#0D1B2A" stroke-width="1.5" fill="none" opacity="0.8">
    <!-- Lignes horizontales -->
    <line x1="14" y1="38" x2="50" y2="38"/>
    <!-- Lignes verticales (obliques) -->
    <line x1="29" y1="24" x2="25" y2="52"/>
    <line x1="38" y1="24" x2="38" y2="52"/>
    <line x1="47" y1="24" x2="51" y2="52"/>
  </g>
  <!-- Pied support -->
  <line x1="26" y1="52" x2="22" y2="60" stroke="#0D1B2A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="52" x2="46" y2="60" stroke="#0D1B2A" stroke-width="2.5" stroke-linecap="round"/>
</svg>
