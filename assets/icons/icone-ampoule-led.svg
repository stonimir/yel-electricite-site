<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Ampoule LED">
  <title>Ampoule LED</title>
  <!-- Bulbe -->
  <path d="M32 8
           C 20 8 14 17 14 26
           C 14 33 18 37 22 41
           L 22 46
           L 42 46
           L 42 41
           C 46 37 50 33 50 26
           C 50 17 44 8 32 8 Z"
        fill="#F5C518" fill-opacity="0.18"
        stroke="#0D1B2A" stroke-width="3" stroke-linejoin="round"/>
  <!-- Culot -->
  <rect x="24" y="46" width="16" height="4" fill="#0D1B2A"/>
  <rect x="25" y="50" width="14" height="3" fill="#0D1B2A" opacity="0.8"/>
  <rect x="26" y="53" width="12" height="3" fill="#0D1B2A" opacity="0.6"/>
  <!-- Filament LED stylisé -->
  <g fill="none" stroke="#F5C518" stroke-width="2.5" stroke-linecap="round">
    <path d="M24 35 L24 22 L28 18 L28 32"/>
    <path d="M40 35 L40 22 L36 18 L36 32"/>
  </g>
  <!-- Rayons (lumière) -->
  <g stroke="#F5C518" stroke-width="2" stroke-linecap="round">
    <line x1="32" y1="2" x2="32" y2="5"/>
    <line x1="10" y1="10" x2="12" y2="12"/>
    <line x1="54" y1="10" x2="52" y2="12"/>
    <line x1="4" y1="28" x2="7" y2="28"/>
    <line x1="57" y1="28" x2="60" y2="28"/>
  </g>
</svg>
