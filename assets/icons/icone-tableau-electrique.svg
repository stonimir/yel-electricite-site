<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Tableau électrique">
  <title>Tableau électrique</title>
  <!-- Coffret -->
  <rect x="10" y="8" width="44" height="48" rx="3" fill="none" stroke="#0D1B2A" stroke-width="3"/>
  <!-- Rail DIN haut -->
  <line x1="14" y1="20" x2="50" y2="20" stroke="#0D1B2A" stroke-width="1.5" opacity="0.4"/>
  <!-- Rail DIN bas -->
  <line x1="14" y1="40" x2="50" y2="40" stroke="#0D1B2A" stroke-width="1.5" opacity="0.4"/>
  <!-- Disjoncteurs rangée 1 -->
  <g fill="#0D1B2A">
    <rect x="16" y="14" width="5" height="12" rx="0.5"/>
    <rect x="23" y="14" width="5" height="12" rx="0.5"/>
    <rect x="30" y="14" width="5" height="12" rx="0.5"/>
    <rect x="37" y="14" width="5" height="12" rx="0.5"/>
    <rect x="44" y="14" width="5" height="12" rx="0.5"/>
  </g>
  <!-- Disjoncteurs rangée 2 (avec un jaune = interrupteur différentiel) -->
  <g fill="#0D1B2A">
    <rect x="16" y="34" width="5" height="12" rx="0.5"/>
    <rect x="23" y="34" width="5" height="12" rx="0.5"/>
    <rect x="37" y="34" width="5" height="12" rx="0.5"/>
    <rect x="44" y="34" width="5" height="12" rx="0.5"/>
  </g>
  <rect x="30" y="34" width="5" height="12" rx="0.5" fill="#F5C518" stroke="#0D1B2A" stroke-width="1"/>
  <!-- Petits leviers blancs -->
  <g fill="#FFFFFF">
    <circle cx="18.5" cy="19" r="0.9"/>
    <circle cx="25.5" cy="19" r="0.9"/>
    <circle cx="32.5" cy="19" r="0.9"/>
    <circle cx="39.5" cy="19" r="0.9"/>
    <circle cx="46.5" cy="19" r="0.9"/>
    <circle cx="18.5" cy="39" r="0.9"/>
    <circle cx="25.5" cy="39" r="0.9"/>
    <circle cx="39.5" cy="39" r="0.9"/>
    <circle cx="46.5" cy="39" r="0.9"/>
  </g>
</svg>
